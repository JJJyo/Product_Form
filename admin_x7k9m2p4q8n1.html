<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .header h1 {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .btn-warning {
            background: #ff9800;
            color: white;
        }

        .btn-warning:hover {
            background: #e68900;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .orders-table th {
            background: #4CAF50;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .orders-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .orders-table tr:hover {
            background: #f8f9fa;
        }

        .order-detail {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px dashed #ddd;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-btn {
            float: right;
            font-size: 1.5em;
            cursor: pointer;
            color: #666;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }
            
            .orders-table {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>订单管理后台</h1>
            <p>查看和管理所有订单</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalOrders">0</div>
                <div class="label">订单总数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalItems">0</div>
                <div class="label">商品总数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalAmount">¥0</div>
                <div class="label">订单总金额</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="exportAllOrders()">导出所有订单</button>
            <button class="btn btn-warning" onclick="clearAllOrders()">清空所有订单</button>
        </div>

        <div id="ordersList">
            <!-- 订单列表将在这里显示 -->
        </div>
    </div>

    <script>
        // 加载所有订单
        function loadOrders() {
            const STORAGE_KEY = 'product_orders_v1';
            let orders = [];
            
            // 尝试从localStorage读取
            const localData = localStorage.getItem(STORAGE_KEY);
            if (localData) {
                orders = JSON.parse(localData);
            } else {
                // 尝试从sessionStorage读取（兼容旧版本）
                const sessionData = sessionStorage.getItem(STORAGE_KEY);
                if (sessionData) {
                    orders = JSON.parse(sessionData);
                }
            }
            
            displayOrders(orders);
            updateStats(orders);
        }

        // 显示订单列表
        function displayOrders(orders) {
            const container = document.getElementById('ordersList');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>暂无订单</h3>
                        <p>还没有人提交订单</p>
                    </div>
                `;
                return;
            }

            let html = `
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>订购人</th>
                            <th>手机号</th>
                            <th>商品种类</th>
                            <th>商品总数</th>
                            <th>订单金额</th>
                            <th>下单时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            orders.forEach((order, index) => {
                const itemCount = order.items.reduce((sum, item) => sum + item.quantity, 0);
                html += `
                    <tr>
                        <td>#${index + 1}</td>
                        <td>${escapeHtml(order.user.name)}</td>
                        <td>${escapeHtml(order.user.phone)}</td>
                        <td>${order.items.length} 种</td>
                        <td>${itemCount} 件</td>
                        <td style="color: #e53935; font-weight: 600;">¥${order.totalPrice}</td>
                        <td>${order.submitTime}</td>
                        <td>
                            <button class="btn btn-primary" onclick="viewOrderDetail(${index})">查看</button>
                            <button class="btn btn-danger" onclick="deleteOrder(${index})">删除</button>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="8">
                            <div class="order-detail" id="detail-${index}" style="display: none;">
                                <h4>订单详情</h4>
                                ${order.items.map(item => `
                                    <div class="order-item">
                                        <span>${item.name}</span>
                                        <span>¥${item.price} × ${item.quantity} = ¥${item.subtotal}</span>
                                    </div>
                                `).join('')}
                                <div class="order-item" style="margin-top: 10px; padding-top: 10px; border-top: 2px solid #4CAF50; font-weight: 600;">
                                    <span>总计</span>
                                    <span style="color: #e53935;">¥${order.totalPrice}</span>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 更新统计
        function updateStats(orders) {
            const totalOrders = orders.length;
            const totalItems = orders.reduce((sum, order) => {
                return sum + order.items.reduce((itemSum, item) => itemSum + item.quantity, 0);
            }, 0);
            const totalAmount = orders.reduce((sum, order) => sum + order.totalPrice, 0);

            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('totalAmount').textContent = `¥${totalAmount}`;
        }

        // 查看订单详情
        function viewOrderDetail(index) {
            const detail = document.getElementById(`detail-${index}`);
            detail.style.display = detail.style.display === 'none' ? 'block' : 'none';
        }

        // 删除订单
        function deleteOrder(index) {
            if (!confirm('确定要删除这个订单吗？')) return;
            
            const STORAGE_KEY = 'product_orders_v1';
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            orders.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
            
            loadOrders();
        }

        // 清空所有订单
        function clearAllOrders() {
            if (!confirm('确定要清空所有订单吗？此操作不可恢复！')) return;
            
            const STORAGE_KEY = 'product_orders_v1';
            localStorage.removeItem(STORAGE_KEY);
            sessionStorage.removeItem(STORAGE_KEY);
            loadOrders();
        }

        // 导出所有订单
        function exportAllOrders() {
            const STORAGE_KEY = 'product_orders_v1';
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            
            if (orders.length === 0) {
                alert('没有订单可导出');
                return;
            }

            let csv = '\uFEFF';
            csv += '订单号,订购人,手机号,下单店铺,商品名称,单价,数量,小计,订单总价,下单时间,备注\n';
            
            orders.forEach((order, index) => {
                order.items.forEach(item => {
                    csv += [
                        index + 1,
                        order.user.name,
                        order.user.phone,
                        order.user.shop || '',
                        item.name,
                        item.price,
                        item.quantity,
                        item.subtotal,
                        order.totalPrice,
                        order.submitTime,
                        order.user.remark || ''
                    ].map(field => `"${String(field).replace(/"/g, '""')}"`).join(',') + '\n';
                });
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `订单汇总_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>
</html>
