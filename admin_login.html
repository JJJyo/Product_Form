<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 40px;
            width: 360px;
            text-align: center;
        }
        .login-box h1 { margin-bottom: 10px; color: #333; }
        .login-box p { margin-bottom: 30px; color: #999; font-size: 0.9em; }
        .login-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            margin-bottom: 15px;
        }
        .login-box input:focus { outline: none; border-color: #4CAF50; }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
        }
        .login-box button:hover { background: #45a049; }
        .error { color: #f44336; font-size: 0.85em; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔒 管理后台</h1>
        <p>请输入管理密码</p>
        <div class="error" id="errorMsg">密码错误，请重试</div>
        <input type="password" id="passwordInput" placeholder="管理密码" onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()">登 录</button>
    </div>
    <script>
        async function doLogin() {
            const pwd = document.getElementById('passwordInput').value;
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: pwd})
                });
                if (res.ok) {
                    window.location.href = '/admin_x7k9m2p4q8n1.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('passwordInput').value = '';
                }
            } catch(e) {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
